[build]
  command = "npm run build:client"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Proxy the app's API calls to the Netlify Functions (server-side Groq).
# Must come before the SPA catch-all so they are not swallowed by index.html.
[[redirects]]
  from = "/api/advisor"
  to = "/.netlify/functions/advisor"
  status = 200

[[redirects]]
  from = "/api/generate-tasks"
  to = "/.netlify/functions/generate-tasks"
  status = 200

[[redirects]]
  from = "/api/generate-caption"
  to = "/.netlify/functions/generate-caption"
  status = 200

# Requires APIFY_API_TOKEN (and GROQ_API_KEY) set in the site's environment
# variables; optional APIFY_ACTOR_ID overrides the default scraper actor.
[[redirects]]
  from = "/api/analyze-social"
  to = "/.netlify/functions/analyze-social"
  status = 200

# Access-key gate: checks the code entered on the app's lock screen against
# APP_ACCESS_KEY, set in the site's environment variables.
[[redirects]]
  from = "/api/verify-access"
  to = "/.netlify/functions/verify-access"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Always revalidate the app shell so users get the latest build immediately
# (hashed assets under /assets/* remain safely cached by their content hash).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
